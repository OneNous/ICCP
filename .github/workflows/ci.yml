name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (tests only need pure-Python paths)
        run: pip install flask pytest
      - name: Schema codegen drift check
        run: python3 codegen/gen_types.py --check
      - name: Pytest
        env:
          PYTHONPATH: src
        run: python3 -m pytest tests/ -q --tb=short
